<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barcode Tool</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    .container { max-width: 540px; margin: 48px auto; background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { margin-top: 0; font-size: 1.4rem; }
    .actions { display: grid; gap: 12px; }
    a.btn { display: block; text-align: center; padding: 12px; border-radius: 6px; text-decoration: none; color: #fff; background: #0a66c2; font-weight: 600; }
    a.btn.secondary { background: #333; }
  </style>
</head>
<body>
  <main class="container">
    <h1>Simple Barcode Tool</h1>
    <div class="actions">
      <a class="btn" href="{{ url_for('generate') }}">Generate Barcode</a>
      <a class="btn secondary" href="{{ url_for('scan') }}">Scan Barcode</a>
    </div>
  </main>
</body>
</html>
